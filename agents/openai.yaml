interface:
  display_name: "Asana"
  short_description: "Read, update, and automate Asana workflows"
  default_prompt: "Use $asana to inspect or update Asana tasks, projects, teams, sections, comments, and workspace data. It also supports workflow-level recipes: use daily-briefing for a read-only My Tasks command center, inbox-cleanup for AI-gated My Tasks triage where the first pass generates a snapshot and plan JSON before any bucketing is applied, close-out-sections for preview-first section retirement, project-assigned-working-set for contextual project pull lists, weekly manager summaries for another person's work, and Friday-style follow-up summaries for tasks where the user is involved but not the owner. Prefer the full specs in references/automations/ when a reusable workflow matches the request. After write operations, surface the returned review_url so the user can review the updated Asana object."
