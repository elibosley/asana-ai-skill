interface:
  display_name: "Asana"
  short_description: "Read, update, and automate Asana workflows"
  default_prompt: "Use $asana to inspect or update Asana tasks, projects, teams, sections, comments, workspace data, and native task tags. It also supports workflow-level recipes: use daily-briefing for an AI-gated, read-only My Tasks command center where the helper generates a snapshot and the agent should author the plan JSON itself before rendering the actionable morning queue, my-tasks-organizer for AI-gated My Tasks triage backed by the inbox-cleanup helper where the helper generates a snapshot and the agent should author the plan JSON before any bucketing is applied, close-out-sections for preview-first section retirement, project-assigned-working-set for contextual project pull lists, weekly manager summaries for another person's work, and Friday-style follow-up summaries for tasks where the user is involved but not the owner. For one-of-many My Tasks sorter labels such as Quick Win, Delegate, Close Out, Deep Work, Waiting, and Needs Clarity, prefer the helper's tag-normalization path instead of treating the sorter like a custom field or overwriting unrelated project tags. Prefer the full specs in references/automations/ when a reusable workflow matches the request. After write operations, surface the returned review_url so the user can review the updated Asana object."
